<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agir Ensemble pour un Nouvel Horizon</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: white;
      }

      .navbar {
        background-color: #202325 !important;
        margin-bottom: 0 !important;
        padding-top: 12, 5px !important;
        padding-bottom: 12, 5px !important;
      }

      .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 255, 255, 1%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
      }

      .hero {
        background-image: url("image/Groupe.jpg");
        background-size: cover;
        background-position: center 30%;
        background-repeat: no-repeat;
        min-height: 500px;
        margin-top: 0;
        display: flex;
        align-items: flex-start;
        padding-top: 0px;
        position: relative;
      }

      @media (max-width: 768px) {
        .hero {
          background-size: 120%;
          background-position: 60% 40%;
          min-height: 120px;
        }

        .navbar-collapse {
          background-color: #202325;
          padding: 10px;
        }

        .navbar-nav {
          flex-direction: row !important;
          gap: 10px !important;
        }

        .hero h1 {
          font-size: 2rem !important;
        }
        .hero p {
          font-size: 1rem !important;
        }
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-md" data-bs-theme="dark">
      <div class="container">
        <span class="navbar-brand text-white fw-bold">NOGENTEL 2033</span>

        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menuNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuNav">
          <ul class="navbar-nav ms-auto flex-row gap-3">
            <li class="nav-item">
              <a class="nav-link text-white" href="index.html">
                <i class="bi bi-house-fill me-1"></i>Accueil
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="liste.html">
                <i class="bi bi-people-fill me-1"></i>Liste
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="programme.html">
                <i class="bi bi-file-text-fill me-1"></i>Programme
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- HERO -->
    <div class="hero">
      <div
        class="position-absolute top-0 start-0 w-100 h-100"
        style="background: rgba(0, 0, 0, 0.4)"
      ></div>
      <div
        class="container position-relative text-white py-3 text-center d-flex flex-column align-items-center justify-content-center"
        style="z-index: 1"
      >
        <h1 class="fw-bold" style="font-size: 4rem; color: #ffffff">
          AGIR ENSEMBLE
        </h1>
        <p class="lead" style="font-size: 1.5rem; color: #ffffff">
          Pour un Nouvel Horizon
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
